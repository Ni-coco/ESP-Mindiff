name: CI Flutter App

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "App/**"
      - ".github/workflows/ci-app.yml"
  push:
    branches: [dev, main]
    paths:
      - "App/**"
      - ".github/workflows/ci-app.yml"

jobs:
  flutter-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Enforce 90% coverage (user profile core)
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          lcov = Path("coverage/lcov.info")
          if not lcov.exists():
            print("coverage/lcov.info not found")
            sys.exit(1)

          text = lcov.read_text().splitlines()
          records = []
          current = None
          for line in text:
            if line.startswith("SF:"):
              current = {"sf": line[3:], "lf": 0, "lh": 0}
            elif line.startswith("LF:") and current is not None:
              current["lf"] = int(line[3:])
            elif line.startswith("LH:") and current is not None:
              current["lh"] = int(line[3:])
            elif line == "end_of_record" and current is not None:
              records.append(current)
              current = None

          raw_lf = sum(r["lf"] for r in records)
          raw_lh = sum(r["lh"] for r in records)
          raw_cov = (raw_lh / raw_lf) * 100 if raw_lf else 0
          print(f"Raw global coverage: {raw_cov:.2f}% ({raw_lh}/{raw_lf})")

          scope_files = {
            "lib/features/user_profile/application/profile_cubit.dart",
            "lib/features/user_profile/application/profile_state.dart",
            "lib/features/user_profile/data/models/user_model.dart",
            "lib/features/user_profile/data/repositories/user_repository_impl.dart",
            "lib/features/user_profile/domain/entities/user.dart",
          }
          scoped = [
            r for r in records
            if r["sf"] in scope_files
          ]
          lf = sum(r["lf"] for r in scoped)
          lh = sum(r["lh"] for r in scoped)
          if lf == 0:
            print("No executable lines found in scoped coverage set")
            sys.exit(1)
          coverage = (lh / lf) * 100
          print(f"Scoped coverage: {coverage:.2f}% ({lh}/{lf})")

          if coverage < 90:
            print("Scoped coverage threshold not met (< 90%)")
            sys.exit(1)
          PY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-lcov
          path: App/coverage/lcov.info
