name: CI Backend

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "Back/**"
      - ".github/workflows/ci-back.yml"
  push:
    branches: [dev, main]
    paths:
      - "Back/**"
      - ".github/workflows/ci-back.yml"

jobs:
  back-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Back

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mindiff
          POSTGRES_PASSWORD: mindiff_test
          POSTGRES_DB: mindiff_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check app tests

      - name: Format check (ruff)
        run: uv run ruff format --check app tests

      - name: Run tests (pytest)
        env:
          POSTGRES_USER: mindiff
          POSTGRES_PASSWORD: mindiff_test
          POSTGRES_DB: mindiff_test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          SKIP_ALEMBIC: "false"
        run: uv run pytest -ra
