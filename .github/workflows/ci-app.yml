name: CI Flutter App

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "App/**"
      - ".github/workflows/ci-app.yml"
  push:
    branches: [dev, main]
    paths:
      - "App/**"
      - ".github/workflows/ci-app.yml"

jobs:
  flutter-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
