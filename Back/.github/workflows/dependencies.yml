name: Dependency Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    name: Scan Dependencies

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run safety check
        run: |
          uv pip install safety
          uv run safety check --json --output safety-report.json || true

      - name: Run pip-audit
        run: |
          uv pip install pip-audit
          uv run pip-audit --desc --output pip-audit-report.txt || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            safety-report.json
            pip-audit-report.txt

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔒 Security Scan Report\n\n';

            if (fs.existsSync('safety-report.json')) {
              comment += '### Safety Check\n```\n';
              const safetyReport = JSON.parse(fs.readFileSync('safety-report.json', 'utf8'));
              comment += JSON.stringify(safetyReport, null, 2) + '\n```\n\n';
            }

            if (fs.existsSync('pip-audit-report.txt')) {
              comment += '### Pip Audit\n```\n';
              comment += fs.readFileSync('pip-audit-report.txt', 'utf8') + '\n```\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
