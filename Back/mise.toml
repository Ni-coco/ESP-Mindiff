[tasks.reset-db]
description = "Reset database"
run = [
    "uv run python scripts/seed-db.py --clean",
]

[tasks.db]
description = "Initialize database"
run = [
    "uv run python scripts/seed_db.py",
]

[tasks.dev]
description = "Run mindiff backend"
run = [
    "uv run uvicorn app.main:app --reload --port 8082"
]

[tasks.init]
description = "Initialize project"
run = [
    "mise run vault",
    "mise run db",
]

[tasks.vault]
description = "Initialize Vault"
run = [
    "uv run python scripts/seed_vault.py"
]

[tasks.docker]
description = "Build and run Docker container"
run = [
    "docker compose -f docker/docker-compose.yml --env-file .env up -d"]

[tasks.sync]
description = "Sync Python dependencies"
run = [
    "uv sync"
]

[hooks]
cd = "mise run sync"
