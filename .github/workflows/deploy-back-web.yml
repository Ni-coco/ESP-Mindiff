name: Deploy Backend and Web Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Back
          file: ./Back/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/app-web
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Flutter web image
        uses: docker/build-push-action@v6
        with:
          context: ./App
          file: ./App/Dockerfile.web
          push: true
          build-args: |
            API_BASE_URL=${{ vars.APP_API_BASE_URL || 'http://localhost:8000/api' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy backend redeploy
        if: ${{ secrets.DOKPLOY_WEBHOOK_BACKEND != '' }}
        run: curl -fsSL -X POST "${{ secrets.DOKPLOY_WEBHOOK_BACKEND }}"

      - name: Trigger Dokploy web redeploy
        if: ${{ secrets.DOKPLOY_WEBHOOK_WEB != '' }}
        run: curl -fsSL -X POST "${{ secrets.DOKPLOY_WEBHOOK_WEB }}"
