; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Build/upload cible uniquement l'ESP32 par défaut
; Pour les tests natifs : pio test -e native
[platformio]
default_envs = upesy_wroom

[env:upesy_wroom]
platform = espressif32
board = upesy_wroom
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
lib_deps =
	bogde/HX711@^0.7.5
	adafruit/Adafruit SSD1306@^2.5.7
	adafruit/Adafruit GFX Library@^1.11.0
	bblanchon/ArduinoJson@^6.21.0
test_ignore = test_weight_utils

[env:wokwi]
; Build sans BLE → Wokwi ne simule pas le hardware Bluetooth
; Le BleManager devient un stub silencieux (voir BleManager.h)
platform = espressif32
board = upesy_wroom
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags = -DNO_BLE
lib_deps =
	bogde/HX711@^0.7.5
	adafruit/Adafruit SSD1306@^2.5.7
	adafruit/Adafruit GFX Library@^1.11.0
	bblanchon/ArduinoJson@^6.21.0
test_ignore = *

[env:native]
platform = native
test_filter = test_weight_utils
build_flags = -std=c++14
